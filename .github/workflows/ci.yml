# Projenin ilk CI'ı (Faz 5, D1.4 — TASK-5.04).
#
# İki job, push + pull_request'te (tüm branch — revize dahil) koşar:
#   • fast  — npm ci → next build → Vitest (birim + i18n parite)
#   • a11y  — npm ci → playwright install chromium → Playwright/axe (a11y regresyon)
#
# CI yalnız DOĞRULAR; deploy ETMEZ. Vercel hâlâ yalnız `main` push'ta deploy eder
# (CI `main`'e/canlıya dokunmaz). a11y job'unun `test:e2e`'si webServer üzerinden
# prod build'i (`next build && next start`) kendi koşar (playwright.config:
# reuseExistingServer=false in CI) → ayrı `next build` adımı gerekmez.
#
# ANTHROPIC_API_KEY CI'da yok → chatbot offline fallback'e düşer; `/` build + a11y
# scan etkilenmez (PHASE-5 Dikkat #8). Secret CI'a eklenmez (gerek yok).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Aynı ref'te yeni push gelince devam eden eski run'ı iptal et (CI dakikası tasarrufu).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Hızlı geri bildirim: build + birim/i18n parite testleri (tarayıcı kurulumu yok).
  fast:
    name: fast (build + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # vitest@4 engines node>=24; yerel ortam da v24.
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Vitest (birim + i18n parite)
        run: npm run test

  # a11y regresyon: gerçek tarayıcıda (chromium) axe denetimi — ayrı job (tarayıcı kurulumlu).
  a11y:
    name: a11y (playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      # Tarayıcı binary'lerini cache'le (lockfile değişince — playwright sürümü dahil — key yenilenir).
      # Cache miss'te de çalışır: aşağıdaki install adımı her koşuda idempotent çalışır.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium + OS deps)
        run: npx playwright install --with-deps chromium

      # webServer prod build'i (next build && next start) kendi koşar; ayrı build adımı yok.
      - name: Playwright/axe (a11y `/` light+dark)
        run: npm run test:e2e
